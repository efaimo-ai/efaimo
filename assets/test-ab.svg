<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="400" viewBox="0 0 1120 400" role="img" aria-label="efaimo test A/B results: csv-cleanup measures +0 points (no measurable effect) while contoso-crm-import measures +100 points (helps); both skills lint clean at grade A.">
  <defs>
    <style>
      .s { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .m { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect x="1" y="1" width="1118" height="398" rx="16" fill="#08090D" stroke="#191D26" stroke-width="1"/>

  <!-- card: csv-cleanup -->
  <rect x="60" y="64" width="480" height="196" rx="12" fill="#0C0E13" stroke="#232834" stroke-width="1"/>
  <text x="84" y="104" class="m" font-size="19" fill="#E9EDF3">csv-cleanup</text>
  <text x="516" y="102" text-anchor="end" class="m" font-size="13" fill="#525a67">lint: A (100)</text>
  <line x1="84" y1="120" x2="516" y2="120" stroke="#191D26" stroke-width="1"/>
  <text x="84" y="157" class="m" xml:space="preserve" font-size="15" fill="#AEB6C2">with skill     8/8 pass</text>
  <rect x="376" y="146" width="140" height="9" rx="4.5" fill="#191D26"/>
  <rect x="376" y="146" width="140" height="9" rx="4.5" fill="#57E7D6"/>
  <text x="84" y="191" class="m" xml:space="preserve" font-size="15" fill="#AEB6C2">without skill  8/8 pass</text>
  <rect x="376" y="180" width="140" height="9" rx="4.5" fill="#191D26"/>
  <rect x="376" y="180" width="140" height="9" rx="4.5" fill="#57E7D6"/>
  <text x="84" y="234" class="m" xml:space="preserve" font-size="15" fill="#79828F">delta  <tspan font-size="20" fill="#E0C879">+0 points</tspan>   no measurable effect</text>

  <!-- card: contoso-crm-import -->
  <rect x="580" y="64" width="480" height="196" rx="12" fill="#0C0E13" stroke="#232834" stroke-width="1"/>
  <text x="604" y="104" class="m" font-size="19" fill="#E9EDF3">contoso-crm-import</text>
  <text x="1036" y="102" text-anchor="end" class="m" font-size="13" fill="#525a67">lint: A (100)</text>
  <line x1="604" y1="120" x2="1036" y2="120" stroke="#191D26" stroke-width="1"/>
  <text x="604" y="157" class="m" xml:space="preserve" font-size="15" fill="#AEB6C2">with skill     8/8 pass</text>
  <rect x="896" y="146" width="140" height="9" rx="4.5" fill="#191D26"/>
  <rect x="896" y="146" width="140" height="9" rx="4.5" fill="#57E7D6"/>
  <text x="604" y="191" class="m" xml:space="preserve" font-size="15" fill="#AEB6C2">without skill  <tspan fill="#E8776A">0/8 pass</tspan></text>
  <rect x="896" y="180" width="140" height="9" rx="4.5" fill="#191D26"/>
  <text x="604" y="234" class="m" xml:space="preserve" font-size="15" fill="#79828F">delta  <tspan font-size="20" fill="#57E7D6">+100 points</tspan>   <tspan fill="#57E7D6">helps</tspan></text>

  <!-- caption -->
  <text x="560" y="330" text-anchor="middle" class="s" font-size="15.5" fill="#79828F">Both skills lint clean; their value is opposite. One is pure context overhead, the other rescues the task from 0.</text>
  <text x="560" y="356" text-anchor="middle" class="s" font-size="15.5" fill="#79828F">Linting cannot tell them apart. efaimo test can.</text>
</svg>
